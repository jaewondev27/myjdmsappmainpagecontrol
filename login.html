<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>인증 확인 - My JDMS</title>
    <style>
        :root {
            --primary: #3182f6;
            --bg: #ffffff;
            --text-main: #191f28;
            --text-sub: #4e5968;
        }
        html, body {
            overflow: hidden;
            height: 100dvh;
            touch-action: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard Variable", Pretendard, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
            padding: 24px;
        }
        
        .content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 320px;
            width: 100%;
        }
        
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .gif-wrap {
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: -10px;
        }
        .loader-gif {
            width: 160%;
            height: 160%;
            object-fit: contain;
        }
        
        .icon-wrap {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-icon {
            width: 100%;
            height: 100%;
        }
        .icon-success { 
            color: #22c55e;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .icon-error { color: #f04452; }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 { 
            margin: 0 0 12px 0; 
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        p { 
            color: var(--text-sub); 
            font-size: 16px; 
            line-height: 1.6; 
            margin: 0;
            word-break: keep-all;
        }
        .email-chip {
            background: #f2f8ff;
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn-group {
            margin-top: 32px;
            width: 100%;
        }
        .btn {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="content-wrap">
        <!-- 1. Confirmation State -->
        <div id="state-confirm" class="status-container">
            <div class="email-chip" id="confirm-email">email@example.com</div>
            <h2>인증을 진행할까요?</h2>
            <p>본인 확인을 위해 아래 버튼을 눌러 인증을 완료해 주세요.</p>
        </div>

        <!-- 2. Loading State -->
        <div id="state-loading" class="status-container hidden">
            <div class="gif-wrap">
                <img src="https://studio.pixelixe.com/mobile/loader.gif" alt="loading" class="loader-gif">
            </div>
            <h2>인증중</h2>
            <p>인증 정보를 처리하고 있습니다.</p>
        </div>

        <!-- 3. Success State -->
        <div id="state-success" class="status-container hidden">
            <div class="icon-wrap">
                <svg class="hero-icon icon-success" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </div>
            <h2>인증 완료!</h2>
            <p>성공적으로 인증되었습니다.<br>이제 앱으로 돌아가셔도 됩니다.</p>
        </div>

        <!-- 4. Error State -->
        <div id="state-error" class="status-container hidden">
            <div class="icon-wrap">
                <svg class="hero-icon icon-error" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
            </div>
            <h2 id="error-title">인증 실패</h2>
            <p id="error-msg">링크가 만료되었거나 유효하지 않습니다.</p>
        </div>

        <div class="btn-group">
            <button id="btn-main-action" class="btn btn-primary" onclick="handleMainAction()">인증하기</button>
        </div>
    </div>

    <script>
        let authData = null;
        let currentState = 'confirm';

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const isSuccess = urlParams.get('auth_success') === 'true';
            const encodedData = urlParams.get('data');

            if (isSuccess && encodedData) {
                try {
                    authData = JSON.parse(atob(encodedData.replace(/-/g, '+').replace(/_/g, '/')));
                    if (authData && authData.email) {
                        document.getElementById('confirm-email').innerText = authData.email;
                        updateState('confirm');
                    } else {
                        showError("유효하지 않은 데이터입니다.");
                    }
                } catch (e) {
                    showError("데이터 처리 중 오류가 발생했습니다.");
                }
            } else {
                showError("만료된 링크이거나 유효하지 않은 접근입니다.");
            }
        }

        function handleMainAction() {
            if (currentState === 'confirm') {
                startVerification();
            } else if (currentState === 'success' || currentState === 'error') {
                window.close();
            }
        }

        function startVerification() {
            updateState('loading');
            
            setTimeout(() => {
                try {
                    localStorage.setItem('userData', JSON.stringify(authData));
                    const authBc = new BroadcastChannel('myjdms_auth');
                    authBc.postMessage({ type: 'LOGIN_SUCCESS', userData: authData });
                    
                    updateState('success');
                } catch (e) {
                    showError("인증 처리 중 오류가 발생했습니다.");
                }
            }, 2000);
        }

        function updateState(state) {
            currentState = state;
            ['confirm', 'loading', 'success', 'error'].forEach(s => {
                document.getElementById('state-' + s).classList.add('hidden');
            });
            document.getElementById('state-' + state).classList.remove('hidden');

            const btn = document.getElementById('btn-main-action');
            if (state === 'loading') {
                btn.classList.add('hidden');
            } else {
                btn.classList.remove('hidden');
                if (state === 'confirm') btn.innerText = '인증하기';
                else if (state === 'success') btn.innerText = '앱으로 돌아가기';
                else if (state === 'error') btn.innerText = '창 닫기';
            }
        }

        function showError(msg) {
            document.getElementById('error-msg').innerText = msg;
            updateState('error');
        }

        window.onload = init;
    </script>
</body>
</html>
