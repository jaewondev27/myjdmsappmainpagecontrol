<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>인증 완료 - My JDMS</title>
    <style>
        :root {
            --primary: #3182f6;
            --bg: #f2f4f6;
            --text: #191f28;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard Variable", Pretendard, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 320px;
            width: 90%;
        }
        .icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
            margin-left: auto;
            margin-right: auto;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        h2 { margin: 0 0 10px 0; font-size: 20px; }
        p { color: #4e5968; font-size: 14px; line-height: 1.5; margin: 0; }
        .loader {
            margin-top: 20px;
            width: 20px;
            height: 20px;
            border: 3px solid #eee;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-icon" class="icon">✓</div>
        <h2 id="status-title">인증 완료!</h2>
        <p id="status-msg">성공적으로 로그인되었습니다.<br>잠시 후 이 창이 자동으로 닫힙니다.</p>
        <div id="loader" class="loader"></div>
    </div>

    <script>
        function completeAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const isSuccess = urlParams.get('auth_success') === 'true';
            const encodedData = urlParams.get('data');

            if (isSuccess && encodedData) {
                try {
                    // 1. 데이터 해독
                    const decodedData = JSON.parse(atob(encodedData.replace(/-/g, '+').replace(/_/g, '/')));
                    
                    if (decodedData && decodedData.email) {
                        // 2. 현재 브라우저의 localStorage에도 저장 (혹시 모르니)
                        localStorage.setItem('userData', JSON.stringify(decodedData));
                        
                        // 3. 같은 브라우저일 경우를 대비해 BroadcastChannel 전송
                        const authBc = new BroadcastChannel('myjdms_auth');
                        authBc.postMessage({ type: 'LOGIN_SUCCESS', userData: decodedData });

                        // 4. 성공 메시지 표시 및 창 닫기 시도
                        document.getElementById('status-msg').innerHTML = `<b>${decodedData.email}</b> 인증에 성공했습니다!<br>메인 앱 화면이 자동으로 업데이트됩니다.`;
                        
                        setTimeout(() => {
                            window.close();
                            // 안 닫힐 경우 대비
                            setTimeout(() => {
                                document.getElementById('status-msg').innerHTML += "<br><br><span style='color: #888; font-size: 12px;'>이 창을 닫고 메인 앱으로 돌아가셔도 좋습니다.</span>";
                                document.getElementById('loader').style.display = 'none';
                            }, 1000);
                        }, 2000);
                    }
                } catch (e) {
                    console.error('Auth error:', e);
                    showError("인증 정보를 처리하는 중 오류가 발생했습니다.");
                }
            } else {
                showError("유효하지 않은 접근이거나 인증에 실패했습니다.");
            }
        }

        function showError(msg) {
            document.getElementById('status-icon').innerText = "!";
            document.getElementById('status-icon').style.background = "#ff4d4f";
            document.getElementById('status-title').innerText = "오류 발생";
            document.getElementById('status-msg').innerText = msg;
            document.getElementById('loader').style.display = 'none';
        }

        // 실행
        window.onload = completeAuth;
    </script>
</body>
</html>
