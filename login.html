<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My JDMS 로그인</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* 토스 스타일 기본 레이아웃 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a1f27;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 40px 24px;
            box-sizing: border-box;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 로고 영역 강조 */
        .logo-section {
            margin-bottom: 50px;
        }
        .school-logo {
            width: 160px; /* 로고를 더 크게 조정 */
            height: auto;
            margin-bottom: 24px;
            /* 부드러운 로딩 효과 */
            transition: transform 0.3s ease;
        }
        .school-logo:hover {
            transform: scale(1.05);
        }
        .welcome-text {
            font-size: 24px;
            font-weight: 700;
            color: #333d4b;
            letter-spacing: -0.5px;
            word-break: keep-all;
        }

        /* 입력 폼 (토스 스타일의 쫀득한 인풋) */
        .input-group {
            position: relative;
            margin-bottom: 12px;
        }
        .toss-input {
            width: 100%;
            height: 58px;
            padding: 0 18px;
            font-size: 16px;
            border: 1px solid #e5e8eb;
            border-radius: 16px;
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #f9fafb;
        }
        .toss-input:focus {
            outline: none;
            border-color: #3182f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.1);
        }
        .toss-input::placeholder {
            color: #adb5bd;
        }

        /* 메인 로그인 버튼 */
        .btn-login {
            width: 100%;
            height: 58px;
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            background-color: #3182f6;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }
        .btn-login:hover {
            background-color: #1b64da;
        }
        .btn-login:active {
            transform: scale(0.96); /* 클릭 시 쫀득하게 눌림 */
        }

        /* 구분선 */
        .divider {
            margin: 35px 0;
            display: flex;
            align-items: center;
            color: #b0b8c1;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #f2f4f6;
        }
        .divider span {
            padding: 0 15px;
        }

        /* 구글 로그인 버튼 중앙 정렬 */
        #googleBtnWrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        /* 하단 보조 링크 */
        .sub-links {
            font-size: 14px;
            color: #8b95a1;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .sub-links a {
            color: #8b95a1;
            text-decoration: none;
            transition: color 0.2s;
        }
        .sub-links a:hover {
            color: #333d4b;
        }
        .v-line {
            color: #e5e8eb;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <img src="https://joongdong.sen.ms.kr/dggb/module/file/selectImageView.do?atchFileId=1555655&fileSn=0" alt="Joongdong Logo" class="school-logo">
            <div class="welcome-text">반가워요!<br>My JDMS에 로그인하세요</div>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" class="toss-input" placeholder="아이디" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" class="toss-input" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn-login" id="mainLoginBtn">로그인</button>
        </form>

        <div class="divider"><span>또는</span></div>

        <div id="googleBtnWrapper"></div>

        <div class="sub-links">
            <a href="#">비밀번호 찾기</a>
            <span class="v-line">|</span>
            <a href="#">회원가입</a>
        </div>
    </div>

    <script>
        // 1. 구글 로그인 성공 시 실행되는 콜백 함수
        function handleCredentialResponse(response) {
            console.log("구글 인증 성공");
            
            // 버튼 상태 변경 (쫀득한 피드백)
            const mainBtn = document.getElementById('mainLoginBtn');
            mainBtn.innerText = "로그인 중...";
            mainBtn.style.opacity = "0.6";

            // 지정하신 페이지로 리디렉션
            setTimeout(() => {
                window.location.href = "https://jaewondev27.github.io/myjdmsappmainpagecontrol/";
            }, 600); // 0.6초 뒤 이동 (시각적 피드백 시간)
        }

        // 2. 페이지 로드 시 구글 로그인 초기화 및 버튼 렌더링
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "545708391060-rj6campu1983term5p538vk9pmhl9s34.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("googleBtnWrapper"),
                { 
                    theme: "outline", 
                    size: "large", 
                    width: 332, 
                    shape: "pill",
                    text: "continue_with" // "Google로 계속하기"
                }
            );

            // 일반 로그인 버튼 클릭 시에도 리디렉션 테스트 (선택 사항)
            document.getElementById('loginForm').onsubmit = function(e) {
                e.preventDefault();
                handleCredentialResponse();
            };
        }
    </script>
</body>
</html>
