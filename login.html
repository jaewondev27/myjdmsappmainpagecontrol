<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 처리 중 - My JDMS</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f2f4f6;
            color: #191f28;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(49, 130, 246, 0.2);
            border-top: 4px solid #3182f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; margin-bottom: 8px; }
        p { font-size: 14px; color: #4e5968; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>로그인 확인 중</h1>
    <p>잠시만 기다려 주세요. 인증이 완료되면 자동으로 창이 닫힙니다.</p>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAKcosBAIbHPjrSeA_P97kniuiH_ncmHcA",
          authDomain: "myjdms-app.firebaseapp.com",
          projectId: "myjdms-app",
          storageBucket: "myjdms-app.firebasestorage.app",
          messagingSenderId: "1087899300940",
          appId: "1:1087899300940:web:55e42de9095a1f45cdb0e9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        async function completeSignIn() {
            if (auth.isSignInWithEmailLink(window.location.href)) {
                let email = window.localStorage.getItem('emailForSignIn');
                if (!email) {
                    email = window.prompt('로그인을 완료하기 위해 이메일 주소를 다시 입력해주세요.');
                }
                
                if (email) {
                    try {
                        const result = await auth.signInWithEmailLink(email, window.location.href);
                        window.localStorage.removeItem('emailForSignIn');
                        
                        const user = result.user;
                        const userData = {
                            name: user.displayName || email.split('@')[0],
                            displayName: user.displayName || email.split('@')[0],
                            email: user.email,
                            uid: user.uid,
                            photoURL: user.photoURL
                        };
                        
                        // Save to localStorage
                        localStorage.setItem('userData', JSON.stringify(userData));
                        
                        // Broadcast to index.html
                        const bc = new BroadcastChannel('myjdms_auth');
                        bc.postMessage({ type: 'LOGIN_SUCCESS', userData });
                        
                        document.body.innerHTML = '<h1>로그인 완료!</h1><p>창이 곧 닫힙니다.</p>';
                        setTimeout(() => {
                            window.close();
                            // Fallback if window.close() fails (sometimes happens in mobile browsers)
                            window.location.href = 'index.html';
                        }, 1000);
                        
                    } catch (error) {
                        console.error('Login error:', error);
                        document.body.innerHTML = '<h1>로그인 실패</h1><p>' + error.message + '</p>';
                    }
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        completeSignIn();
    </script>
</body>
</html>
