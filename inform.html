function mountInlineLucideIcons(root) {

            right: 0;

    <script>
        function refreshLayoutSafeArea() {
            const probe = document.createElement('div');
            probe.setAttribute('aria-hidden', 'true');
            probe.style.cssText = 'position:fixed;left:0;top:0;width:0;height:0;pointer-events:none;visibility:hidden;overflow:hidden;z-index:0;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);';
            document.documentElement.appendChild(probe);
            const cs = getComputedStyle(probe);
            let top = parseFloat(cs.paddingTop) || 0;
            let right = parseFloat(cs.paddingRight) || 0;
            let bottom = parseFloat(cs.paddingBottom) || 0;
            let left = parseFloat(cs.paddingLeft) || 0;
            probe.remove();
            const vv = window.visualViewport;
            if (vv && vv.scale <= 1.02) {
                const obscuredBottom = Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop));
                bottom = Math.max(bottom, obscuredBottom);
            }
            const rs = document.documentElement.style;
            rs.setProperty('--sat', top + 'px');
            rs.setProperty('--sar', right + 'px');
            rs.setProperty('--sab', bottom + 'px');
            rs.setProperty('--sal', left + 'px');
        }

        function closeStandalonePage() {
            try {
                if (typeof AndroidInterface !== 'undefined') {
                    if (typeof AndroidInterface.finish === 'function') { AndroidInterface.finish(); return; }
                    if (typeof AndroidInterface.closeApp === 'function') { AndroidInterface.closeApp(); return; }
                    if (typeof AndroidInterface.exitApp === 'function') { AndroidInterface.exitApp(); return; }
                }
            } catch (e) {}
            try { window.close(); } catch (e) {}
            try {
                if (window.opener && !window.opener.closed) { window.opener.focus(); }
            } catch (e) {}
            setTimeout(function () {
                if (window.closed) return;
                if (history.length > 1) { history.back(); return; }
                try { window.close(); } catch (e2) {}
            }, 80);
        }
        function leavePage() { closeStandalonePage(); }

        const THEME_MODE_KEY = 'theme_mode';
        const MYJDMS_THEME_BC = 'myjdms_theme_sync_v1';
        let __myjdmsThemeBc = null;
        try {
            if (typeof BroadcastChannel !== 'undefined') {
                __myjdmsThemeBc = new BroadcastChannel(MYJDMS_THEME_BC);
                __myjdmsThemeBc.onmessage = function (ev) {
                    const m = ev && ev.data && ev.data.mode;
                    if (m !== 'light' && m !== 'dark' && m !== 'auto') return;
                    if (m === themeMode) return;
                    themeMode = m;
                    try { localStorage.setItem(THEME_MODE_KEY, m); } catch (er) {}
                    applyTheme(themeMode);
                };
            }
        } catch (e) {}

        const APP_VERSION_KEY = 'app_version';
        const DEFAULT_VERSION = '2.0.0.1';
        const GITHUB_UPDATE_URL = 'https://api.github.com/repos/jaewondev27/myjdms-updater/contents/update';

        function getNativeThemeMode() {
            try {
                if (typeof AndroidInterface !== 'undefined' && AndroidInterface.getThemeMode) {
                    const m = AndroidInterface.getThemeMode();
                    if (m === 'light' || m === 'dark' || m === 'auto') return m;
                }
            } catch (e) {}
            return '';
        }
        function saveNativeThemeMode(mode) {
            try {
                if (typeof AndroidInterface !== 'undefined' && AndroidInterface.saveThemeMode) {
                    AndroidInterface.saveThemeMode(mode);
                }
            } catch (e) {}
        }
        const darkQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
        let themeMode = getNativeThemeMode() || localStorage.getItem(THEME_MODE_KEY) || 'auto';
        localStorage.setItem(THEME_MODE_KEY, themeMode);

        function applyTheme(mode) {
            const shouldDark = mode === 'dark' || (mode === 'auto' && darkQuery && darkQuery.matches);
            document.body.classList.toggle('dark-mode', !!shouldDark);
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            const color = shouldDark ? '#141414' : '#f2f4f6';
            if (metaTheme) metaTheme.setAttribute('content', color);
            try {
                if (typeof AndroidInterface !== 'undefined') {
                    const useDarkIcons = !shouldDark;
                    if (AndroidInterface.setStatusBarDarkIcons) AndroidInterface.setStatusBarDarkIcons(useDarkIcons);
                    if (AndroidInterface.setStatusBarStyle) AndroidInterface.setStatusBarStyle(useDarkIcons ? 'dark' : 'light');
                }
            } catch (e) {}
        }
        applyTheme(themeMode);
        if (darkQuery && darkQuery.addEventListener) {
            darkQuery.addEventListener('change', () => { if (themeMode === 'auto') applyTheme('auto'); });
        }
        window.addEventListener('storage', (e) => {
            if (e.key === THEME_MODE_KEY && e.newValue) {
                themeMode = e.newValue;
                applyTheme(themeMode);
            }
        });

        function getNativeVersion() {
            try {
                if (typeof UpdateInterface !== 'undefined' && UpdateInterface.getVersion) {
                    const v = UpdateInterface.getVersion();
                    if (v) return String(v).trim();
                }
            } catch (e) {}
            try {
                if (typeof AndroidInterface !== 'undefined' && AndroidInterface.getVersion) {
                    const v = AndroidInterface.getVersion();
                    if (v) return String(v).trim();
                }
            } catch (e) {}
            return '';
        }
        function getCurrentVersion() {
            const nativeVersion = getNativeVersion();
            if (nativeVersion) {
                localStorage.setItem(APP_VERSION_KEY, nativeVersion);
                return nativeVersion;
            }
            return localStorage.getItem(APP_VERSION_KEY) || DEFAULT_VERSION;
        }
        function compareVersions(v1, v2) {
            const parts1 = v1.split('.').map(Number);
            const parts2 = v2.split('.').map(Number);
            for (let i = 0; i < Math.max(parts1.length, parts2.length); i++) {
                const p1 = parts1[i] || 0;
                const p2 = parts2[i] || 0;
                if (p1 > p2) return 1;
                if (p1 < p2) return -1;
            }
            return 0;
        }
        async function fetchAvailableVersions() {
            try {
                const response = await fetch(GITHUB_UPDATE_URL);
                const data = await response.json();
                if (Array.isArray(data)) {
                    return data
                        .filter(item => item.type === 'dir' && /^\d+\.\d+\.\d+(?:\.\d+)?$/.test(item.name))
                        .map(item => item.name)
                        .sort((a, b) => compareVersions(b, a));
                }
            } catch (e) { console.error(e); }
            return [];
        }
        async function checkForUpdates() {
            const loadingEl = document.getElementById('app-info-loading');
            const statusEl = document.getElementById('app-info-status');
            const btnEl = document.getElementById('update-check-btn');
            loadingEl.style.display = 'flex';
            statusEl.style.display = 'none';
            btnEl.style.display = 'none';
            try {
                const versions = await fetchAvailableVersions();
                const currentVersion = getCurrentVersion();
                const latestVersion = versions.length > 0 ? versions[0] : currentVersion;
                loadingEl.style.display = 'none';
                btnEl.style.display = 'flex';
                if (compareVersions(latestVersion, currentVersion) > 0) {
                    statusEl.textContent = `새 버전 ${latestVersion}이(가) 있습니다.`;
                    statusEl.style.color = '#3182f6';
                    statusEl.style.display = 'block';
                    if (typeof UpdateInterface !== 'undefined' && UpdateInterface.showUpdatePage) {
                        UpdateInterface.showUpdatePage(latestVersion);
                    }
                } else {
                    statusEl.textContent = '최신 버전입니다.';
                    statusEl.style.color = '#8b95a1';
                    statusEl.style.display = 'block';
                }
            } catch (e) {
                loadingEl.style.display = 'none';
                btnEl.style.display = 'flex';
                statusEl.textContent = '업데이트 확인에 실패했습니다.';
                statusEl.style.color = '#f04452';
                statusEl.style.display = 'block';
            }
        }
        function closeVersionModal() {
            document.getElementById('version-modal').classList.remove('show');
        }
        window.showVersionSelector = async function () {
            const modal = document.getElementById('version-modal');
            const listEl = document.getElementById('version-list');
            modal.classList.add('show');
            listEl.innerHTML = '<div class="version-loading">버전을 불러오는 중...</div>';
            try {
                const versions = await fetchAvailableVersions();
                const currentVersion = getCurrentVersion();
                if (versions.length === 0) {
                    listEl.innerHTML = '<div class="version-loading">사용 가능한 버전이 없습니다.</div>';
                    return;
                }
                let html = '';
                versions.forEach(v => {
                    const isCurrent = v === currentVersion;
                    html += `<div class="version-item ${isCurrent ? 'current' : ''}" onclick="selectVersion('${v}')">
                        <span class="version-item-label">${v}</span>
                        <span class="version-item-badge">${isCurrent ? '현재' : (compareVersions(v, currentVersion) > 0 ? '최신' : '이전')}</span>
                    </div>`;
                });
                listEl.innerHTML = html;
            } catch (e) {
                listEl.innerHTML = '<div class="version-loading">버전 목록을 불러오지 못했습니다.</div>';
            }
        };
        function selectVersion(version) {
            closeVersionModal();
            const currentVersion = getCurrentVersion();
            if (version === currentVersion) {
                alert('이미 현재 버전입니다.');
                return;
            }
            if (typeof UpdateInterface !== 'undefined' && UpdateInterface.showUpdatePage) {
                UpdateInterface.showUpdatePage(version);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            refreshLayoutSafeArea();
            window.addEventListener('resize', refreshLayoutSafeArea);
            window.addEventListener('orientationchange', () => setTimeout(refreshLayoutSafeArea, 150));
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', refreshLayoutSafeArea);
                window.visualViewport.addEventListener('scroll', refreshLayoutSafeArea);
            }
            try {
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            } catch (e) {}

            const cv = getCurrentVersion();
            document.getElementById('app-info-version').textContent = `버전 ${cv}`;
            const nvInit = getNativeVersion();
            if (nvInit) localStorage.setItem(APP_VERSION_KEY, nvInit);
            checkForUpdates();

            let titleTapCount = 0;
            let titleTapTimer = null;
            document.getElementById('app-info-title').addEventListener('click', () => {
                titleTapCount++;
                if (titleTapTimer) clearTimeout(titleTapTimer);
                titleTapTimer = setTimeout(() => { titleTapCount = 0; }, 500);
                if (titleTapCount >= 5) {
                    titleTapCount = 0;
                    window.showVersionSelector();
                }
            });
        });
    </script>
</body>
</html>
